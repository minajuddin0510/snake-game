<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Outfit', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0, 255, 100, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 50, 80, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .game-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Score bar */
    .score-bar {
      width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.4s, transform 0.4s;
    }

    .score-bar.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .score-bar .label {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.4);
    }

    .score-bar .score-value {
      font-size: 28px;
      font-weight: 800;
      color: #39ff80;
      text-shadow: 0 0 20px rgba(57, 255, 128, 0.3);
    }

    /* Canvas */
    .canvas-container {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06),
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(57, 255, 128, 0.05);
    }

    canvas {
      display: block;
      background: #101018;
    }

    /* Overlays */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(12px);
      transition: opacity 0.35s ease;
      z-index: 10;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Start screen */
    .start-screen .title {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #39ff80, #00cc55);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      margin-bottom: 8px;
    }

    .start-screen .subtitle {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* Game over screen */
    .gameover-screen .go-title {
      font-size: 42px;
      font-weight: 800;
      color: #ff3b5c;
      margin-bottom: 12px;
      text-shadow: 0 0 30px rgba(255, 59, 92, 0.3);
    }

    .gameover-screen .final-score-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }

    .gameover-screen .final-score {
      font-size: 64px;
      font-weight: 800;
      color: #39ff80;
      text-shadow: 0 0 30px rgba(57, 255, 128, 0.3);
      margin-bottom: 40px;
    }

    /* Buttons */
    .btn {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 16px 48px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #39ff80, #00cc55);
      color: #0a0a0f;
      box-shadow:
        0 4px 20px rgba(57, 255, 128, 0.25),
        0 0 0 1px rgba(57, 255, 128, 0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 8px 30px rgba(57, 255, 128, 0.35),
        0 0 0 1px rgba(57, 255, 128, 0.25);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Snake icon decoration on start screen */
    .snake-icon {
      display: flex;
      gap: 6px;
      margin-bottom: 32px;
    }

    .snake-icon span {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      background: #39ff80;
      opacity: 0.8;
    }

    .snake-icon span:nth-child(1) { opacity: 1; }
    .snake-icon span:nth-child(2) { opacity: 0.7; }
    .snake-icon span:nth-child(3) { opacity: 0.5; }
    .snake-icon span:nth-child(4) { opacity: 0.3; }
    .snake-icon span:nth-child(5) { opacity: 0.15; }

    /* Controls hint */
    .controls-hint {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="score-bar" id="scoreBar">
      <span class="label">Score</span>
      <span class="score-value" id="scoreDisplay">0</span>
    </div>

    <div class="canvas-container">
      <canvas id="gameCanvas" width="600" height="600"></canvas>

      <!-- Start Screen -->
      <div class="overlay start-screen" id="startScreen">
        <div class="snake-icon">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="title">Snake</div>
        <div class="subtitle">A Classic Reimagined</div>
        <button class="btn" id="playBtn">Play</button>
        <div class="controls-hint">Use arrow keys to move</div>
      </div>

      <!-- Game Over Screen -->
      <div class="overlay gameover-screen hidden" id="gameOverScreen">
        <div class="go-title">Game Over</div>
        <div class="final-score-label">Your Score</div>
        <div class="final-score" id="finalScore">0</div>
        <button class="btn" id="restartBtn">Restart</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const scoreBar = document.getElementById('scoreBar');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const finalScore = document.getElementById('finalScore');
    const playBtn = document.getElementById('playBtn');
    const restartBtn = document.getElementById('restartBtn');

    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE; // 30 tiles
    const GAME_SPEED = 100; // ms per tick

    let snake, direction, nextDirection, food, score, gameLoop, isRunning;

    // ── Drawing helpers ──────────────────────────────────

    function drawGrid() {
      ctx.fillStyle = '#101018';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Subtle grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.015)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= TILE_COUNT; i++) {
        const pos = i * GRID_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const x = segment.x * GRID_SIZE;
        const y = segment.y * GRID_SIZE;
        const pad = 1;

        if (index === 0) {
          // Head — brighter with glow
          ctx.shadowColor = 'rgba(57,255,128,0.5)';
          ctx.shadowBlur = 12;
          ctx.fillStyle = '#50ff90';
          ctx.beginPath();
          ctx.roundRect(x + pad, y + pad, GRID_SIZE - pad * 2, GRID_SIZE - pad * 2, 5);
          ctx.fill();
          ctx.shadowBlur = 0;
        } else {
          // Body — slight gradient fade
          const t = 1 - (index / snake.length) * 0.5;
          const g = Math.round(255 * t);
          ctx.fillStyle = `rgb(30, ${g}, 70)`;
          ctx.beginPath();
          ctx.roundRect(x + pad, y + pad, GRID_SIZE - pad * 2, GRID_SIZE - pad * 2, 4);
          ctx.fill();
        }
      });
    }

    function drawFood() {
      const x = food.x * GRID_SIZE;
      const y = food.y * GRID_SIZE;
      const center = GRID_SIZE / 2;

      // Glow
      ctx.shadowColor = 'rgba(255,60,80,0.6)';
      ctx.shadowBlur = 16;

      ctx.fillStyle = '#ff3b5c';
      ctx.beginPath();
      ctx.arc(x + center, y + center, GRID_SIZE / 2 - 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
    }

    // ── Game logic ───────────────────────────────────────

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * TILE_COUNT),
          y: Math.floor(Math.random() * TILE_COUNT)
        };
      } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
      food = pos;
    }

    function resetGame() {
      const mid = Math.floor(TILE_COUNT / 2);
      snake = [
        { x: mid, y: mid },
        { x: mid - 1, y: mid },
        { x: mid - 2, y: mid }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      scoreDisplay.textContent = '0';
      spawnFood();
    }

    function update() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Wall collision
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        endGame();
        return;
      }

      // Self collision
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreDisplay.textContent = score;
        spawnFood();
      } else {
        snake.pop();
      }

      // Draw
      drawGrid();
      drawFood();
      drawSnake();
    }

    function startGame() {
      resetGame();
      startScreen.classList.add('hidden');
      gameOverScreen.classList.add('hidden');
      scoreBar.classList.add('visible');
      isRunning = true;

      drawGrid();
      drawFood();
      drawSnake();

      gameLoop = setInterval(update, GAME_SPEED);
    }

    function endGame() {
      isRunning = false;
      clearInterval(gameLoop);
      finalScore.textContent = score;
      gameOverScreen.classList.remove('hidden');
    }

    // ── Controls ─────────────────────────────────────────

    document.addEventListener('keydown', (e) => {
      if (!isRunning) return;

      switch (e.key) {
        case 'ArrowUp':
          if (direction.y === 0) nextDirection = { x: 0, y: -1 };
          break;
        case 'ArrowDown':
          if (direction.y === 0) nextDirection = { x: 0, y: 1 };
          break;
        case 'ArrowLeft':
          if (direction.x === 0) nextDirection = { x: -1, y: 0 };
          break;
        case 'ArrowRight':
          if (direction.x === 0) nextDirection = { x: 1, y: 0 };
          break;
      }

      // Prevent page scrolling with arrow keys
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
    });

    playBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    // ── Initial draw ─────────────────────────────────────
    drawGrid();
  </script>
</body>
</html>
